version: "3.9"

services:
  financeagentbot:
    build: .
    container_name: financeagentbot
    restart: unless-stopped
    volumes:
      - ./finance.db:/app/finance.db
      - ./.env:/app/.env:ro
    ports:
      - "8900:8900"
    environment:
      - CF_BIN=cloudflared
      - CLAUDE_URL=http://host.docker.internal:3099/chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
