<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZakatBot Finance</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="logo">⚡ ZakatBot</div>
    <nav>
      <a href="#" class="nav-item active" data-tab="overview">
        <span>📊</span> Umumiy
      </a>
      <a href="#" class="nav-item" data-tab="transactions">
        <span>📋</span> Tranzaksiyalar
      </a>
      <a href="#" class="nav-item" data-tab="calendar">
        <span>📅</span> Kalendar
      </a>
      <a href="#" class="nav-item" data-tab="analytics">
        <span>📈</span> Tahlil
      </a>
    </nav>
    <div class="sidebar-footer">
      <strong id="user-name">—</strong>
      <span id="user-budget"></span>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div class="month-nav">
        <button id="prev-month">‹</button>
        <span id="month-label"></span>
        <button id="next-month">›</button>
      </div>
      <span id="uid-display"></span>
    </header>

    <!-- OVERVIEW -->
    <div id="tab-overview" class="tab-content active">
      <div class="cards">
        <div class="card income">
          <div class="card-label">Daromad</div>
          <div class="card-row">
            <div class="card-value" id="c-income">—</div>
            <div class="card-icon">💰</div>
          </div>
        </div>
        <div class="card expense">
          <div class="card-label">Xarajat</div>
          <div class="card-row">
            <div class="card-value" id="c-expense">—</div>
            <div class="card-icon">💸</div>
          </div>
        </div>
        <div class="card balance">
          <div class="card-label">Balans</div>
          <div class="card-row">
            <div class="card-value" id="c-balance">—</div>
            <div class="card-icon">📊</div>
          </div>
        </div>
        <div class="card budget">
          <div class="card-label">Byudjet sarf</div>
          <div class="card-row">
            <div class="card-value" id="c-budget-pct">—</div>
            <div class="card-icon">🎯</div>
          </div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-box">
          <h3>Kategoriyalar</h3>
          <canvas id="pie-chart"></canvas>
        </div>
        <div class="chart-box">
          <h3>6 oylik trend</h3>
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

      <div class="recent-box">
        <h3 class="section-title">Oxirgi tranzaksiyalar</h3>
        <div id="recent-list"></div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="tab-transactions" class="tab-content">
      <div class="filter-bar">
        <input type="text" id="tx-search" placeholder="🔍  Qidirish...">
        <select id="tx-type">
          <option value="">Barchasi</option>
          <option value="expense">💸 Xarajat</option>
          <option value="income">💰 Daromad</option>
        </select>
      </div>
      <table class="tx-table">
        <thead>
          <tr>
            <th>Sana</th>
            <th>Kategoriya</th>
            <th>Tavsif</th>
            <th>Miqdor</th>
            <th>Manba</th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
      <div id="tx-empty" class="empty-state" style="display:none">Tranzaksiya yo'q</div>
    </div>

    <!-- CALENDAR -->
    <div id="tab-calendar" class="tab-content">
      <div id="calendar-grid"></div>
      <div class="cal-legend">
        <span class="cal-dot expense"></span>&nbsp;Xarajat
        &nbsp;&nbsp;
        <span class="cal-dot income"></span>&nbsp;Daromad
      </div>
    </div>

    <!-- ANALYTICS -->
    <div id="tab-analytics" class="tab-content">
      <div class="charts-row">
        <div class="chart-box">
          <h3>Xarajat taqsimoti</h3>
          <canvas id="doughnut-chart"></canvas>
        </div>
        <div class="chart-box">
          <h3>Oylik xarajat vs daromad</h3>
          <canvas id="bar-chart"></canvas>
        </div>
      </div>
      <div class="cat-breakdown" id="cat-breakdown"></div>
    </div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
